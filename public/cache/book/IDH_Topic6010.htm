<p class="ps79"><span class="ts3">Evrâd u ezkâr&#305; bazen de&#287;i&#351;tirip okumak laz&#305;m. Çünkü ülfet hâs&#305;l olabilir. Bizim için en tehlikeli &#351;eylerden biri de; dinî hayat&#305; folklor hâline getirmektir. Yani, tefekkür ve heyecan&#305; ülfet bohças&#305;na sar&#305;p sarmalay&#305;p bir yana b&#305;rakmakt&#305;r.</span></p>
