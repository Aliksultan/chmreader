<p class="ps1150"><span class="ts12">&nbsp;</span></p>
<p class="ps1150"><span class="ts12">Ahlâk ve vicdan, terbiye ve nezaket, her ülkede geçerli bir akçe ve para dalgalanmalar&#305;ndan müteessir olmayan bir p&#305;rlanta gibidir. Onlar&#305; elde eden, yüksek itibarl&#305; tacirlere benzer ki, ba&#351;ka sermayeleri olmasa da, her yerde al&#305;&#351;veri&#351; yapabilirler.</span></p>
