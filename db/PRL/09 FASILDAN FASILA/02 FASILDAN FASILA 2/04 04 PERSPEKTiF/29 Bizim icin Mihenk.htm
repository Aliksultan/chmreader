<p class="ps407"><span class="ts131">Bizim &#304;çin Mihenk</span></p>
<p class="ps79"><span class="ts3">Bazen hisler, hevesler fikir suretine girer ve bizleri aldatabilirler. Onun için her dü&#351;ünce ve fikrimizi, önce mihenge vurup de&#287;erlendirmemiz, sonra tatbike sunmam&#305;z icap eder. Bizim için mihenk bellidir.. evet mihenk, Kitap&rsquo;t&#305;r, Sünnet&rsquo;tir ve cumhur&#8209;u uleman&#305;n dedikleridir.</span></p>
